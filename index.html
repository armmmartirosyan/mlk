<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="icon" type="image/png" href="./images/droplet.png" />
    <title>MLK</title>
</head>

<body class="generic-body">
    <main class="small-canvas main-page ui-scrollbar_hidden">
        <div class="home__wrapper">
            <img src="images/mlk.svg" alt="MLK" class="home__logo">
            <div class="home__carousel" data-home-carousel>
                <div class="home__carousel-track">
                    <div class="home__carousel-item home__carousel-item_pos_left" data-carousel-item>
                        <img src="images/cup-of-coffee.png" alt="Carousel item" class="home__carousel-item-image">
                        <div class="home__carousel-item-overlay">
                            <div class="home__carousel-item-profile">
                                <img src="images/girl.png" alt="Sophia.love avatar" class="home__carousel-item-avatar">
                                <div class="home__carousel-item-meta">
                                    <p class="home__carousel-item-name">Sophia.love</p>
                                    <p class="home__carousel-item-fans">2.4K fans</p>
                                </div>
                            </div>
                            <button class="home__carousel-item-sub generic-button-reset">$9.99 / month</button>
                        </div>
                    </div>
                    <div class="home__carousel-item home__carousel-item_pos_center" data-carousel-item>
                        <img src="images/king_of_the_wheel.png" alt="Carousel item" class="home__carousel-item-image">
                        <div class="home__carousel-item-overlay">
                            <div class="home__carousel-item-profile">
                                <img src="images/girl.png" alt="Alex.vip avatar" class="home__carousel-item-avatar">
                                <div class="home__carousel-item-meta">
                                    <p class="home__carousel-item-name">Alex.vip</p>
                                    <p class="home__carousel-item-fans">8.5K fans</p>
                                </div>
                            </div>
                            <button class="home__carousel-item-sub generic-button-reset">$14.99 / month</button>
                        </div>
                    </div>
                    <div class="home__carousel-item home__carousel-item_pos_right" data-carousel-item>
                        <img src="images/you_are_my_genie.png" alt="Carousel item" class="home__carousel-item-image">
                        <div class="home__carousel-item-overlay">
                            <div class="home__carousel-item-profile">
                                <img src="images/girl.png" alt="Mia.star avatar" class="home__carousel-item-avatar">
                                <div class="home__carousel-item-meta">
                                    <p class="home__carousel-item-name">Mia.star</p>
                                    <p class="home__carousel-item-fans">5.1K fans</p>
                                </div>
                            </div>
                            <button class="home__carousel-item-sub generic-button-reset">$12.99 / month</button>
                        </div>
                    </div>
                </div>
                <nav class="home__carousel-nav" aria-label="Carousel navigation">
                    <button class="home__carousel-dot" aria-label="Slide 1" data-carousel-dot="0"></button>
                    <button class="home__carousel-dot home__carousel-dot_active" aria-label="Slide 2" data-carousel-dot="1"></button>
                    <button class="home__carousel-dot" aria-label="Slide 3" data-carousel-dot="2"></button>
                </nav>
            </div>
            <div class="home__content">
                <h1 class="home__content-title">Hello, <span class="home__content-title-highlight">jjghhh!</span></h1>
                <p class="home__content-description">
                    <span class="home__content-description-part">
                        Para is your new way to earn way more from your most loyal fans.
                    </span>
                    <span class="home__content-description-part">
                        We’ve got a full toolbox of features, but for now — just hit the big green button below. In one
                        second, you’ll get your own ready-to-go page.
                    </span>
                </p>
                <button class="home__content-button generic-button-reset">See my Para</button>
            </div>
        </div>
    </main>
    <script src="scripts/home-carousel.js" defer></script>
</body>

</html>
