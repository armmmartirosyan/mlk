<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/index.css" />
    <title>Choose Username</title>
</head>

<body class="generic-body">
    <main class="generic-canvas username-page">
        <section class="username-page__surface" aria-label="Username setup page">
            <header class="username-page__header">
                <button class="username-page__menu-button generic-button-reset" type="button" aria-label="Open menu">
                    <span class="username-page__menu-icon" aria-hidden="true">
                        <span class="username-page__menu-line"></span>
                        <span class="username-page__menu-line"></span>
                        <span class="username-page__menu-line"></span>
                    </span>
                </button>

                <img src="images/mlk.png" alt="MLK" class="username-page__brand-logo" />

                <button class="username-page__profile-button generic-button-reset" type="button"
                    aria-label="Profile indicator">
                    <img src="images/droplet-icon.png" alt="Droplet" class="username-page__profile-icon" />
                </button>
            </header>

            <form class="username-form" action="#" method="post" novalidate>
                <h1 class="username-form__title typo typo_size_74 typo_weight_500 typo_color_primary">Choose your
                    <br />
                    MLK username
                </h1>

                <label class="username-form__line" for="username-input">
                    <span class="username-form__domain typo typo_weight_500">mlk.com/</span>
                    <input id="username-input" class="username-form__input generic-input-reset typo" type="text"
                        name="username" placeholder="username" autocomplete="username" required />
                </label>

                <button
                    class="username-form__submit generic-button-reset ui-pill-button typo typo_size_46 typo_weight_500"
                    type="submit">
                    Start earning
                </button>
            </form>
        </section>
    </main>
</body>

</html>
