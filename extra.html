<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/extra.css" />
    <title>extra</title>
</head>

<body class="generic-body">
    <header class="extra__header">
        <button class="generic-button-reset" type="button" aria-label="Profile indicator">
            <img class="extra__header-menu-icon" src="images/menu-icon.svg" alt="Menu" />
        </button>
        <img src="./images/mlk.svg" alt="MLK" class="extra__header-logo" />

        <button class="generic-button-reset" type="button" aria-label="Profile indicator">
            <img class="extra__header-droplet-icon" src="images/header-droplet.svg" alt="Droplet" />
        </button>
    </header>
    <div class="extra__body">
        <div class="extra__body-primary-info">
            <img src="images/girl.png" alt="Girl" class="extra__body-primary-img">
            <div class="extra__body-primary-box">
                <h1 class="extra__body-primary-name">
                    Carol.xxx
                    <img src="images/verified.svg" alt="Verified" class="extra__body-primary-name-verified-icon">
                </h1>
                <img src="images/of-icon.svg" alt="OF" class="extra__body-primary-fans-icon">
            </div>
        </div>

        <div class="extra__body-list">
            <div class="extra__body-list-item">
                <img src="images/dyson.png" alt="Dyson" class="extra__body-list-item-img">
                <div class="extra__body-list-item-box">
                    <h2 class="extra__body-list-item-name">Dyson Airwrap Multi-Styler💙</h2>
                    <p class="extra__body-list-item-gift">GIFT <br> FOR</p>
                    <p class="extra__body-list-item-amount">$390</p>
                </div>
            </div>
            <div class="extra__body-list-item">
                <img src="images/dress.png" alt="Dress" class="extra__body-list-item-img">
                <div class="extra__body-list-item-box">
                    <h2 class="extra__body-list-item-name">Latex dress🖤</h2>
                    <p class="extra__body-list-item-gift">GIFT <br> FOR</p>
                    <p class="extra__body-list-item-amount">$349</p>
                </div>
            </div>
            <div class="extra__body-list-item">
                <img src="images/flowers.png" alt="Flowers" class="extra__body-list-item-img">
                <div class="extra__body-list-item-box">
                    <h2 class="extra__body-list-item-name">101 roses for your beloved Carol🌹💓</h2>
                    <p class="extra__body-list-item-gift">GIFT <br> FOR</p>
                    <p class="extra__body-list-item-amount">$150</p>
                </div>
            </div>
            <div class="extra__body-list-item">
                <img src="images/no-dress.png" alt="No Dress" class="extra__body-list-item-img">
                <div class="extra__body-list-item-box">
                    <h2 class="extra__body-list-item-name">Bandage Long Dress🖤</h2>
                    <p class="extra__body-list-item-gift">GIFT <br> FOR</p>
                    <p class="extra__body-list-item-amount">$155</p>
                </div>
            </div>
            <div class="extra__body-list-item">
                <img src="images/night-dress.png" alt="Night Dress" class="extra__body-list-item-img">
                <div class="extra__body-list-item-box">
                    <h2 class="extra__body-list-item-name">sexe girl💕</h2>
                    <p class="extra__body-list-item-gift">GIFT <br> FOR</p>
                    <p class="extra__body-list-item-amount">$150</p>
                </div>
            </div>
            <div class="extra__body-list-item">
                <img src="images/dress.png" alt="Dress" class="extra__body-list-item-img">
                <div class="extra__body-list-item-box">
                    <h2 class="extra__body-list-item-name">Latex dress🖤</h2>
                    <p class="extra__body-list-item-gift">GIFT <br> FOR</p>
                    <p class="extra__body-list-item-amount">$349</p>
                </div>
            </div>
            <div class="extra__body-list-item-tip">
                <p class="extra__body-list-item-tip-name">Tip Carol.xxx</p>
                <textarea class="extra__body-list-item-tip-textarea" placeholder="Say something..."></textarea>
                <div class="extra__body-list-item-tip-footer">
                    <div class="extra__body-list-item-tip-sum-box">
                        <div>
                            <p class="extra__body-list-item-tip-sum-name">Sum</p>
                            <p class="extra__body-list-item-tip-sum-amount">$99</p>
                        </div>
                        <button class="generic-button-reset extra__body-list-item-tip-plus-button"
                            type="button">+</button>
                    </div>
                    <button class="generic-button-reset extra__body-list-item-tip-button" type="button">Tip</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
