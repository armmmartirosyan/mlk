<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/sign-in.css" />
    <link rel="icon" type="image/png" href="./images/droplet.png" />
    <title>Sign In</title>
</head>

<body class="generic-body">
    <main class="generic-canvas signin-page ui-scrollbar_hidden" aria-label="Sign in page">
        <section class="signin-page__surface">
            <header class="signin-page__header">
                <a class="signin-page__brand-pill" href="index.html" aria-label="Back to main pages">
                    <img src="images/angle.svg" alt="Arrow" class="signin-page__brand-angle">
                    <img src="images/mlk.svg" alt="MLK" class="signin-page__brand-icon">
                </a>
            </header>

            <form class="signin-form" action="#" method="post" novalidate>
                <h1 class="signin-form__title type-68-500-primary">Sign In</h1>

                <label class="signin-form__field ui-panel ui-panel_tone_glass" for="signin-email">
                    <span class="signin-form__field-label">Email</span>
                    <input id="signin-email" class="signin-form__input generic-input-reset" type="email" name="email"
                        autocomplete="email" required maxlength="254" />
                </label>

                <label class="signin-form__field ui-panel ui-panel_tone_glass" for="signin-password">
                    <span class="signin-form__field-label">Password</span>
                    <span class="signin-form__password-row">
                        <input id="signin-password" class="signin-form__input generic-input-reset" type="password"
                            name="password" autocomplete="current-password" required maxlength="128" />
                        <button id="signin-password-toggle" class="signin-form__password-toggle generic-button-reset"
                            type="button" aria-label="Show password" aria-pressed="false">
                        </button>
                    </span>
                </label>

                <button class="signin-form__submit generic-button-reset" type="submit">
                    Sign In
                </button>

                <a class="signin-form__forgot" href="#">Forgot password?</a>
            </form>
        </section>

    </main>
    <script src="scripts/signin-password-toggle.js"></script>
</body>

</html>
