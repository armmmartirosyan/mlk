<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <title>Chat</title>
</head>

<body class="advancedlevel-generic-body">
    <main class="advancedlevel-generic-canvas">
        <section class="advancedlevel-page" aria-label="Chat page">
            <aside class="advancedlevel-page__sidebar" aria-label="Sidebar navigation">
                <nav class="advancedlevel-navigation" aria-label="Main sections">
                    <ul class="advancedlevel-generic-list-reset">
                        <li class="advancedlevel-navigation__item">
                            <a class="advancedlevel-navigation__link advancedlevel-navigation__link_state_active"
                                href="#">chat</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_1">
                            <a class="advancedlevel-navigation__link" href="#">to-do</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_1">
                            <a class="advancedlevel-navigation__link" href="#">lots</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_1">
                            <a class="advancedlevel-navigation__link" href="#">store</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_1">
                            <a class="advancedlevel-navigation__link" href="#">vault</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_1">
                            <a class="advancedlevel-navigation__link" href="#">money</a>
                        </li>

                        <div class="advancedlevel-navigation__divider"></div>

                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_2">
                            <a class="advancedlevel-navigation__link" href="#">feed</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_2">
                            <a class="advancedlevel-navigation__link" href="#">trophies</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_2">
                            <a class="advancedlevel-navigation__link" href="#">settings</a>
                        </li>
                        <li class="advancedlevel-navigation__item advancedlevel-navigation__item_group_2">
                            <a class="advancedlevel-navigation__link" href="#">help</a>
                        </li>
                    </ul>
                </nav>
            </aside>

            <section class="advancedlevel-page__workspace" aria-label="Chat workspace">
                <header class="advancedlevel-page__header">
                    <div></div>
                    <img src="./images/mlk.png" alt="MLK" class="advancedlevel-page__logo" />

                    <button class="advancedlevel-generic-button-reset"
                        type="button" aria-label="Profile indicator">
                        <img class="advancedlevel-page__droplet-icon"
                            src="images/droplet-icon.png" alt="Droplet" />
                    </button>
                </header>

                <section class="advancedlevel-chat-toolbar" aria-label="Search and chat filters">
                    <label class="advancedlevel-chat-search" for="advancedlevel-chat-search-input">
                        <img class="advancedlevel-chat-search__icon" src="images/advancedlevel-chat-search-icon.svg"
                            alt="" />
                        <input id="advancedlevel-chat-search-input"
                            class="advancedlevel-generic-input-reset advancedlevel-chat-search__input" type="text"
                            placeholder="Search" />
                    </label>

                    <ul class="advancedlevel-generic-list-reset advancedlevel-chat-filters"
                        aria-label="Chat categories">
                        <li class="advancedlevel-chat-filters__item">All</li>
                        <li class="advancedlevel-chat-filters__item">Unread</li>
                        <li class="advancedlevel-chat-filters__item">A+</li>
                        <li class="advancedlevel-chat-filters__item">A</li>
                        <li class="advancedlevel-chat-filters__item">B</li>
                        <li class="advancedlevel-chat-filters__item">C</li>
                    </ul>

                    <div class="advancedlevel-generic-divider advancedlevel-chat-toolbar__divider" aria-hidden="true">
                    </div>
                    <p class="advancedlevel-chat-toolbar__status">No chats found</p>
                </section>

                <section class="advancedlevel-chat-empty-state" aria-live="polite">
                    <p class="advancedlevel-chat-empty-state__line">
                        Hello, kjhkjhkjhjkhkjh!
                    </p>
                    <p class="advancedlevel-chat-empty-state__line">
                        You don't have any chats.
                    </p>
                </section>
            </section>
        </section>
    </main>
</body>

</html>
