<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/sidebar-layout.css" />
    <link rel="stylesheet" href="css/help-modal.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <title>Chat</title>
</head>

<body class="generic-body">
    <main class="generic-canvas">
        <header class="page__header">
            <div></div>
            <img src="./images/mlk.svg" alt="MLK" class="page__logo" />

            <button class="generic-button-reset" type="button" aria-label="Profile indicator">
                <img class="page__droplet-icon" src="images/header-droplet.svg" alt="Droplet" />
            </button>
        </header>


        <section class="page" aria-label="Chat page">
            <aside class="page__sidebar" aria-label="Sidebar navigation">
                <nav class="navigation" aria-label="Main sections">
                    <ul class="generic-list-reset">
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link navigation__link_state_active" href="chat.html">chat</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="todo.html">to-do</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="lots.html">lots</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="store.html">store</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="vault.html">vault</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="money.html">money</a>
                        </li>

                        <div class="navigation__divider"></div>

                        <li class="navigation__item navigation__item_group_2">
                            <a class="navigation__link" href="feed.html">feed</a>
                        </li>
                        <li class="navigation__item navigation__item_group_2">
                            <a class="navigation__link" href="trophies.html">trophies</a>
                        </li>
                        <li class="navigation__item navigation__item_group_2">
                            <a class="navigation__link" href="settings.html">settings</a>
                        </li>
                        <li class="navigation__item navigation__item_group_2">
                            <button class="navigation__link navigation__help-trigger generic-button-reset" type="button">help</button>
                        </li>
                    </ul>
                </nav>
            </aside>


            <section class="page__workspace" aria-label="Chat workspace">
                <div class="page__content chat-page__content">
                    <section class="chat-toolbar" aria-label="Search and chat filters">
                        <div class="chat-toolbar__section">
                            <label class="chat-search" for="chat-search-input">
                                <img class="chat-search__icon" src="images/search-icon.svg" alt="" />
                                <input id="chat-search-input" class="generic-input-reset chat-search__input" type="text"
                                    placeholder="Search" />
                            </label>
                        </div>

                        <ul class="generic-list-reset chat-filters" aria-label="Chat categories">
                            <li class="chat-filters__item chat-filters__item_state_active">All
                            </li>
                            <li class="chat-filters__item">Unread</li>
                            <li class="chat-filters__item">A+</li>
                            <li class="chat-filters__item">A</li>
                            <li class="chat-filters__item">B</li>
                            <li class="chat-filters__item">C</li>


                            <div class="chat-filters__line"></div>

                        </ul>

                        <div class="chat-toolbar__section">
                            <p class="type-12-primary">No chats found</p>
                        </div>
                    </section>

                    <section class="chat-content" aria-label="Chat content">
                        <div class="chat-empty-state" aria-live="polite">
                            <p class="chat-empty-state__line type-24-500-primary">
                                Hello, Someone!
                            </p>
                            <p class="chat-empty-state__line type-24-500-primary">
                                You don't have any chats.
                            </p>
                        </div>
                    </section>
                </div>
            </section>
        </section>
    </main>
    <script src="scripts/help-modal.js" defer></script>
</body>

</html>
