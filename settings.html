<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/globals.css" />
    <link rel="stylesheet" href="css/sidebar-layout.css" />
    <link rel="stylesheet" href="css/settings.css" />
    <title>Settings</title>
</head>

<body class="generic-body">
    <main class="generic-canvas">
        <section class="page" aria-label="Settings page">
            <aside class="page__sidebar" aria-label="Sidebar navigation">
                <nav class="navigation" aria-label="Main sections">
                    <ul class="generic-list-reset">
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="chat.html">chat</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="todo.html">to-do</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="lots.html">lots</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="store.html">store</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="vault.html">vault</a>
                        </li>
                        <li class="navigation__item navigation__item_group_1">
                            <a class="navigation__link" href="money.html">money</a>
                        </li>

                        <div class="navigation__divider"></div>

                        <li class="navigation__item navigation__item_group_2">
                            <a class="navigation__link" href="feed.html">feed</a>
                        </li>
                        <li class="navigation__item navigation__item_group_2">
                            <a class="navigation__link" href="trophies.html">trophies</a>
                        </li>
                        <li class="navigation__item navigation__item_group_2">
                            <a class="navigation__link navigation__link_state_active" href="settings.html">settings</a>
                        </li>
                        <li class="navigation__item navigation__item_group_2">
                            <a class="navigation__link" href="help.html">help</a>
                        </li>
                    </ul>
                </nav>
            </aside>

            <section class="page__workspace" aria-label="Settings workspace">
                <header class="page__header">
                    <div></div>
                    <img src="./images/mlk.png" alt="MLK" class="page__logo" />

                    <button class="generic-button-reset" type="button" aria-label="Profile indicator">
                        <img class="page__droplet-icon" src="images/droplet-icon.png" alt="Droplet" />
                    </button>
                </header>

                <div class="page__content settings-page__content">
                    <figure class="settings-page__image-figure">
                        <img class="settings-page__image-img" src="images/droplet-big.svg" alt="Settings" />
                        <figcaption class="settings-page__image-figcaption">
                            <img src="images/camera.svg" alt="Camera" class="settings-page__image-figcaption-icon" />
                        </figcaption>
                    </figure>
                    <div class="settings-page__text-line">
                        <h1 class="settings-page__text">kjhkjhkjhjkhkjh</h1>
                        <div class="settings-page__pencil-div">
                            <img src="images/pencil.svg" alt="Pencil" class="settings-page__pencil-icon">
                        </div>
                    </div>
                    <div class="settings-page__text-line">
                        <h1 class="settings-page__email">someverylongemail@example.com</h1>
                        <div class="settings-page__pencil-div">
                            <img src="images/pencil.svg" alt="Pencil" class="settings-page__pencil-icon">
                        </div>
                    </div>
                    <div class="settings-page__resend-line">
                        <img src="images/clock.svg" alt="Clock" class="settings-page__resend-icon">
                        <p class="settings-page__resend-info">Unverified email</p>
                        <button class="generic-button-reset settings-page__resend-button" type="button">Resend</button>
                    </div>
                    <button class="settings-page__set-password-btn generic-button-reset" type="button">
                        Set new password
                    </button>
                    <div class="settings-page__social-line">
                        <img src="images/social-group.svg" alt="Social" class="settings-page__social-icon">
                        <p class="settings-page__social-info">Add social media accounts</p>
                    </div>
                </div>
            </section>
        </section>

        <!-- Messages modal -->
        <div class="messages-modal">
            <div class="messages-modal__header">
                <div></div>
                <h2 class="messages-modal__title">Messages</h2>
                <button class="generic-button-reset messages-modal__close-btn" type="button"
                    aria-label="Close messages modal">
                    <img src="images/close-icon.svg" alt="Close" class="messages-modal__close-icon" />
                </button>
            </div>
            <div class="messages-modal__body">
                <div></div>
                <div class="messages-modal__body-content">
                    <img src="images/messages-quote.svg" alt="Quote" class="messages-modal__body-icon">
                    <p class="messages-modal__body-info">No messages</p>
                    <p class="messages-modal__body-description">
                        Messages from the team will be shown here
                    </p>
                </div>
                <button class="generic-button-reset messages-modal__body-button" type="button">
                    Send us a message
                    <img src="images/send-message.svg" alt="Send" class="messages-modal__body-button-icon">
                </button>
            </div>
            <div class="messages-modal__footer">
                <div class="messages-modal__footer-tab">
                    <img src="images/home-icon.svg" alt="Home" class="messages-modal__footer-tab-img">
                    <p class="messages-modal__footer-tab-text">Home</p>
                </div>
                <div class="messages-modal__footer-tab">
                    <img src="images/messages-quote.svg" alt="Messages" class="messages-modal__footer-tab-img">
                    <p class="messages-modal__footer-tab-text">Messages</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
